<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Immersive Experience</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      font-family:Arial, sans-serif;
      background:black;
    }

    .container{
      display:flex;
      width:100vw;
      height:100vh;
    }

    .panel{
      flex:1;
      position:relative;

      display:flex;
      justify-content:center;
      align-items:center;

      transition:0.5s ease;
    }

    .panel:hover{
      flex:1.2;
    }

    .left{
      background:
      linear-gradient(
        rgba(0,0,0,0.6),
        rgba(0,0,0,0.8)
      ),
      url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200');

      background-size:cover;
      background-position:center;
    }

    .right{
      background:
      linear-gradient(
        rgba(0,0,0,0.6),
        rgba(0,0,0,0.8)
      ),
      url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200');

      background-size:cover;
      background-position:center;
    }

    .content{
      text-align:center;
      color:white;
    }

    h1{
      font-size:4rem;
      letter-spacing:4px;
      margin-bottom:20px;
    }

    p{
      color:#cccccc;
      margin-bottom:30px;
    }

    button{
      padding:15px 40px;
      border:none;
      border-radius:50px;

      background:white;
      color:black;

      font-weight:bold;
      cursor:pointer;

      transition:0.3s ease;
    }

    button:hover{
      background:#00ffff;
      transform:scale(1.05);
      box-shadow:0 0 20px #00ffff;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="panel left">

    <div class="content">

      <h1>AR MODE</h1>

      <p>View models in augmented reality</p>

      <button onclick="window.location.href='pages/ar.html'">
        ENTER
      </button>

    </div>

  </div>

  <div class="panel right">

    <div class="content">

      <h1>MUSIC WORLD</h1>

      <p>Immersive retro radio experience</p>

      <button onclick="window.location.href='pages/immersion.html'">
        ENTER
      </button>

    </div>

  </div>

</div>

</body>
</html>
